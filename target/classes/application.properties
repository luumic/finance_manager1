spring.application.name=FinanceManager

#MYSQL CONFIGURATION
spring.datasource.url=${MYSQL_DBMS}
spring.datasource.username=root
spring.datasource.password=${DBMS_PASSWORD}

server.servlet.context-path=/api/v1.0

#JPA CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Email Configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smpt.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_FROM_EMAIL}

jwt.secret = XK3p9v2JmQ6rZ8tN1yF5cH7sW4dL0aB9uE2kG6nP8vR3xT7zS1qM5hD9cK2wF6j

finance.manager.frontend.url=${FINANCE_MANAGER_FRONTEND_URL}

app.activation.url=${FINANCE_MANAGER_BACKEND_URL}

spring.profiles.active=prod